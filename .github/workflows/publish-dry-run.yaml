name: Publish dry run

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Dry run
        run: flutter pub publish --dry-run
