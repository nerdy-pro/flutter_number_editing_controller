name: number_editing_controller
description: A TextEditingController that formats numbers, decimals, and currencies as you type with locale support.
version: 2.1.0
repository: https://github.com/nerdy-pro/flutter_number_editing_controller

topics:
  - text-field
  - number-format
  - currency
  - input

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  dependency_validator: ^5.0.2
